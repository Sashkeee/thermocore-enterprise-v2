<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Live Temp Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Noto+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#2b6cee",
              "background-light": "#f6f6f8",
              "background-dark": "#111722",
              "surface-dark": "#192233",
              "surface-border": "#232f48",
            },
            fontFamily: {
              "display": ["Space Grotesk", "sans-serif"],
              "body": ["Noto Sans", "sans-serif"],
            },
            borderRadius: {
              "DEFAULT": "0.25rem", 
              "lg": "0.5rem", 
              "xl": "0.75rem", 
              "2xl": "1rem",
              "3xl": "1.5rem",
              "full": "9999px"
            },
            boxShadow: {
              'glow-amber': '0 0 20px -5px rgba(245, 158, 11, 0.5)',
              'glow-cyan': '0 0 20px -5px rgba(6, 182, 212, 0.5)',
              'inner-glow': 'inset 0 2px 4px 0 rgba(255, 255, 255, 0.05)',
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: "Noto Sans", sans-serif;
        }
        h1, h2, h3, .font-display {
            font-family: "Space Grotesk", sans-serif;
        }
        /* Custom scrollbar hiding for cleaner mobile look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased overflow-hidden select-none">
<div class="relative flex h-screen w-full flex-col overflow-hidden max-w-md mx-auto shadow-2xl bg-background-light dark:bg-background-dark">
<!-- Header -->
<header class="flex items-center justify-between px-6 pt-12 pb-4 bg-background-light dark:bg-background-dark z-10">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-3xl">thermostat</span>
<h1 class="text-xl font-bold font-display tracking-tight">TempControl</h1>
</div>
<button class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400">notifications</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto no-scrollbar pb-24 px-6 flex flex-col gap-6">
<!-- Temperature Readout Section -->
<section class="relative flex flex-col items-center justify-center py-8 rounded-3xl bg-surface-dark border border-surface-border shadow-inner-glow">
<!-- Status Badge -->
<div class="absolute top-4 right-4 flex items-center gap-1.5 px-3 py-1 rounded-full bg-red-500/10 border border-red-500/20 animate-pulse">
<span class="material-symbols-outlined text-red-500 text-[18px]">warning</span>
<span class="text-xs font-bold text-red-500 tracking-wider">ALARM</span>
</div>
<div class="flex flex-col items-center mt-4">
<span class="text-slate-400 text-sm font-medium tracking-widest uppercase mb-1">Current Temp</span>
<div class="relative">
<h2 class="text-7xl font-bold font-display text-transparent bg-clip-text bg-gradient-to-br from-white to-slate-400 tracking-tighter">
                            75.4<span class="text-4xl align-top text-slate-500">°C</span>
</h2>
</div>
<div class="flex items-center gap-2 mt-2">
<span class="flex h-2 w-2 rounded-full bg-green-500"></span>
<span class="text-sm text-green-500 font-medium">+2.1% (5m)</span>
</div>
</div>
<!-- Circular Progress Indicator Background (Abstract) -->
<div class="absolute inset-0 rounded-3xl pointer-events-none opacity-20" style="background: radial-gradient(circle at center, rgba(43, 108, 238, 0.15) 0%, transparent 70%);">
</div>
</section>
<!-- Chart Section -->
<section class="flex flex-col gap-3">
<div class="flex items-center justify-between px-1">
<h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wide">Trend (5m)</h3>
<button class="text-xs text-primary font-medium hover:text-blue-400 transition-colors">Full History</button>
</div>
<div class="w-full h-48 bg-surface-dark rounded-2xl border border-surface-border p-4 relative overflow-hidden">
<!-- Grid Lines -->
<div class="absolute inset-0 flex flex-col justify-between p-4 pointer-events-none opacity-10">
<div class="w-full h-px bg-white"></div>
<div class="w-full h-px bg-white"></div>
<div class="w-full h-px bg-white"></div>
<div class="w-full h-px bg-white"></div>
</div>
<!-- SVG Chart Line -->
<svg class="w-full h-full relative z-10" preserveaspectratio="none" viewbox="0 0 300 100">
<defs>
<lineargradient id="chartGradient" x1="0" x2="0" y1="0" y2="1">
<stop offset="0%" stop-color="#2b6cee" stop-opacity="0.4"></stop>
<stop offset="100%" stop-color="#2b6cee" stop-opacity="0"></stop>
</lineargradient>
</defs>
<path d="M0,80 C20,80 40,60 60,65 C80,70 100,40 120,45 C140,50 160,30 180,25 C200,20 220,35 240,40 C260,45 280,10 300,15 L300,100 L0,100 Z" fill="url(#chartGradient)"></path>
<path d="M0,80 C20,80 40,60 60,65 C80,70 100,40 120,45 C140,50 160,30 180,25 C200,20 220,35 240,40 C260,45 280,10 300,15" fill="none" stroke="#2b6cee" stroke-linecap="round" stroke-width="3"></path>
<!-- Pulsing Dot at the end -->
<circle cx="300" cy="15" fill="#fff" r="4"></circle>
</svg>
<!-- Time Labels -->
<div class="absolute bottom-2 left-4 right-4 flex justify-between text-[10px] text-slate-500 font-mono">
<span>-5m</span>
<span>-4m</span>
<span>-3m</span>
<span>-2m</span>
<span>-1m</span>
<span>Now</span>
</div>
</div>
</section>
<!-- Controls Section -->
<section class="grid grid-cols-2 gap-4 mt-auto">
<!-- Heater Button (Active State Example) -->
<button class="group relative flex flex-col items-center justify-center h-32 rounded-2xl bg-amber-500/10 border border-amber-500/30 shadow-glow-amber active:scale-95 transition-all duration-200">
<div class="absolute inset-0 bg-gradient-to-b from-amber-500/10 to-transparent rounded-2xl opacity-50"></div>
<div class="h-12 w-12 rounded-full bg-amber-500/20 flex items-center justify-center mb-3 group-hover:bg-amber-500/30 transition-colors">
<span class="material-symbols-outlined text-amber-500 text-3xl" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
</div>
<span class="text-amber-500 font-bold font-display tracking-wide z-10">HEATER</span>
<span class="text-amber-400/60 text-xs font-mono mt-1 z-10">ON - 45%</span>
<div class="absolute top-3 right-3 h-2 w-2 rounded-full bg-amber-500 animate-pulse shadow-[0_0_8px_rgba(245,158,11,1)]"></div>
</button>
<!-- Pump Button (Inactive State Example) -->
<button class="group relative flex flex-col items-center justify-center h-32 rounded-2xl bg-surface-dark border border-surface-border active:scale-95 transition-all duration-200 hover:border-cyan-500/50 hover:bg-cyan-900/10">
<div class="h-12 w-12 rounded-full bg-surface-border flex items-center justify-center mb-3 group-hover:bg-cyan-500/20 transition-colors">
<span class="material-symbols-outlined text-slate-400 group-hover:text-cyan-400 text-3xl transition-colors">water_drop</span>
</div>
<span class="text-slate-400 group-hover:text-cyan-400 font-bold font-display tracking-wide transition-colors">PUMP</span>
<span class="text-slate-600 group-hover:text-cyan-400/60 text-xs font-mono mt-1 transition-colors">OFF</span>
</button>
</section>
</main>
<!-- Bottom Navigation -->
<nav class="border-t border-surface-border bg-surface-dark px-6 pb-8 pt-4">
<div class="flex items-center justify-between">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">dashboard</span>
<span class="text-[10px] font-medium tracking-wide">Monitor</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500 hover:text-slate-300 transition-colors" href="#">
<span class="material-symbols-outlined text-2xl">description</span>
<span class="text-[10px] font-medium tracking-wide">Logs</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500 hover:text-slate-300 transition-colors" href="#">
<span class="material-symbols-outlined text-2xl">tune</span>
<span class="text-[10px] font-medium tracking-wide">Adjust</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500 hover:text-slate-300 transition-colors" href="#">
<span class="material-symbols-outlined text-2xl">settings</span>
<span class="text-[10px] font-medium tracking-wide">Settings</span>
</a>
</div>
</nav>
</div>
</body></html>
